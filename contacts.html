<body>
    <nav class="navbar navbar-expand-lg shadow-sm fixed-top" style="background-color: #0a0a0a; border-bottom: 2px solid #C9A84C;">
        <div class="container"><a class="navbar-brand fw-bold" href="index.html" style="color: #C9A84C;">Abdoulaziz Ridwan Houssein</a><div class="navbar-nav ms-auto"><a class="nav-link" href="index.html" style="color: #E8E6E1;">Home</a><a class="nav-link" href="about.html" style="color: #E8E6E1;">About</a><a class="nav-link" href="portfolio.html" style="color: #E8E6E1;">Projects</a><a class="nav-link fw-bold border-bottom" href="contacts.html" style="color: #C9A84C; border-color: #C9A84C !important;">Contacts</a></div></div>

    <section class="py-5" style="padding-top: 130px !important;">
        <div class="container">
            <!-- Original Contact Form and Details -->
            <div class="row g-5">
                <div class="col-md-6" data-aos="fade-right">
                    <div class="card p-4 border-0 shadow-sm rounded-4">
                        <h4 class="fw-bold mb-4" style="color: #C9A84C;">Get In Touch</h4>
                        <form action="https://formspree.io/f/mbdqlnzv" method="POST">
                            <div class="mb-3"><input type="text" name="name" class="form-control" placeholder="Full Name" required></div>
                            <div class="mb-3"><input type="email" name="email" class="form-control" placeholder="Email Address" required></div>
                            <div class="mb-3"><textarea name="message" class="form-control" rows="4" placeholder="How can I help you?" required></textarea></div>
                            <button type="submit" class="btn text-white w-100 py-2" style="background-color: #C9A84C; color: #0a0a0a !important; font-weight: 600;">Send Message</button>
                        </form>
                    </div>
                </div>
                <div class="col-md-6" data-aos="fade-left">
                    <div class="p-4 bg-white rounded-4 shadow-sm h-100">
                        <h4 class="fw-bold mb-4" style="color: #C9A84C;">Contact Details</h4>
                        <p style="color: #A8A5A0;"><strong style="color: #C9A84C;">Emails:</strong> breezystepper@gmail.com / ridwanabdoulaziz@gmail.com</p>
                        <p style="color: #A8A5A0;"><strong style="color: #C9A84C;">Phone:</strong> +253 77 06 05 53</p>
                        <p style="color: #A8A5A0;"><strong style="color: #C9A84C;">Instagram:</strong> @bigstepper_69</p>
                        <hr style="border-color: #333;">
                        <h5 class="fw-bold mt-4" style="color: #C9A84C;">Academic Availability</h5>
                        <p class="mb-1" style="color: #A8A5A0;"><strong style="color: #C9A84C;">Sat - Wed:</strong> 08:00 AM - 08:30 PM</p>
                        <p class="text-danger fw-bold">Thu - Fri: Closed</p>
                    </div>
                </div>
            </div>


        </div>
    </section>

    <button onclick="toggleChat()" style="position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: #C9A84C; border: none; color: #0a0a0a; font-size: 24px; z-index: 1000; cursor: pointer; box-shadow: 0 4px 10px rgba(201, 168, 76, 0.4);">💬</button>
    <div id="chatbox" style="position: fixed; bottom: 90px; right: 20px; width: 300px; height: 400px; background: #1a1a1a; border: 1px solid #C9A84C; border-radius: 15px; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 5px 20px rgba(201, 168, 76, 0.3); z-index: 1000;">
        <div style="background: #C9A84C; color: #0a0a0a; padding: 15px; font-weight: bold; display: flex; justify-content: space-between;"><span>Assistant</span><button onclick="toggleChat()" style="background: none; border: none; color: #0a0a0a; cursor: pointer;">✕</button></div>
        <div id="chat-messages" style="flex: 1; padding: 15px; overflow-y: auto; color: #E8E6E1;"></div>
        <div style="padding: 10px; border-top: 1px solid #C9A84C; display: flex;"><input type="text" id="user-input" onkeypress="handleKey(event)" style="flex: 1; border: 1px solid #C9A84C; border-radius: 20px; padding: 8px 15px; outline: none; background-color: #2a2a2a; color: #E8E6E1;" placeholder="Ask me..."><button onclick="sendMessage()" style="background: none; border: none; color: #C9A84C; margin-left: 5px; cursor: pointer;">➤</button></div>
    </div>

    <script>AOS.init({ duration: 1000, once: true });</script>
