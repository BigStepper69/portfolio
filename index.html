<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Abdoulaziz Ridwan Houssein</title>

    <!-- CRITICAL: Prevent white flash -->
    <style>
        html, body {
            background-color: #0a0a0a !important;
            margin: 0;
            padding: 0;
        }
    </style>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Profile - Slightly bigger than original 180px */
        .profile-container {
            position: relative;
            width: 300px; 
            height: 300px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #C9A84C;
            box-shadow: 0 6px 15px rgba(201, 168, 76, 0.3);
            flex-shrink: 0;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Gold Mask/Filter */
        .profile-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(201, 168, 76, 0.15); 
            pointer-events: none;
        }

        body {
            background-color: #0a0a0a !important;
            color: #E8E6E1 !important;
        }

        .text-secondary {
            color: #A8A5A0 !important;
        }

        .bg-white {
            background-color: #1a1a1a !important;
            border: 1px solid #C9A84C !important;
        }

        h1, h6 {
            color: #C9A84C !important;
        }

        .btn.text-white {
            background-color: #C9A84C !important;
            border-color: #C9A84C !important;
            color: #0a0a0a !important;
            font-weight: 600;
        }

        .btn[style*="border: 2px solid"] {
            border-color: #C9A84C !important;
            color: #C9A84C !important;
        }

        #chatbox {
            background: #1a1a1a !important;
            border: 1px solid #C9A84C !important;
        }

        #chatbox > div:first-child {
            background: #C9A84C !important;
            color: #0a0a0a !important;
        }

        #chatbox button[style*="color: #90A98F"] {
            color: #C9A84C !important;
        }

        button[onclick="toggleChat()"] {
            background: #C9A84C !important;
            color: #0a0a0a !important;
        }

        #user-input {
            background-color: #2a2a2a !important;
            border-color: #C9A84C !important;
            color: #E8E6E1 !important;
        }

        #user-input::placeholder {
            color: #888 !important;
        }

        /* Hero Section - NOT full height, allows scrolling */
        .hero-section {
            min-height: calc(100vh - 100px);
            display: flex;
            align-items: center;
            padding-top: 100px;
            padding-bottom: 50px;
        }

        .hero-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 80px;
            width: 100%;
        }

        .hero-left {
            flex: 0 1 auto;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            max-width: 500px;
        }

        .hero-right {
            flex: 0 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* TYPING ANIMATION STYLES */
        .typing-container {
            display: inline-block;
        }

        .typing-text {
            color: #C9A84C;
            font-size: 2.5rem;
            font-weight: bold;
            border-right: 3px solid #C9A84C;
            padding-right: 5px;
            animation: blink-caret 0.75s step-end infinite;
            min-height: 1.2em;
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #C9A84C }
        }

        /* API BOXES - SIDE BY SIDE */
        .api-box {
            background-color: #1a1a1a;
            border: 1px solid #C9A84C;
            border-radius: 10px;
            padding: 15px;
            flex: 1;
            min-width: 200px;
        }

        .api-box h6 {
            color: #C9A84C;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .api-box p {
            font-size: 0.8rem;
            color: #A8A5A0;
            margin-bottom: 4px;
        }

        .api-box span {
            color: #888;
        }

        /* Quote specific styling */
        .quote-text {
            color: #E8E6E1;
            font-style: italic;
            font-size: 0.8rem;
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .quote-author {
            color: #C9A84C;
            font-size: 0.75rem;
            font-weight: 600;
            text-align: right;
        }

        .quote-loading {
            color: #888;
            font-size: 0.8rem;
            font-style: italic;
        }

        /* Container for side-by-side boxes */
        .api-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            max-width: 450px;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .hero-content {
                flex-direction: column-reverse;
                gap: 40px;
                text-align: center;
            }

            .hero-left {
                align-items: center;
                text-align: center;
            }

            .typing-text {
                font-size: 2rem;
            }

            .api-container {
                flex-direction: column;
                max-width: 100%;
                width: 100%;
            }
        }

        @media (max-width: 576px) {
            .profile-container {
                width: 180px;
                height: 180px;
            }

            .typing-text {
                font-size: 1.5rem;
            }
        }
    </style>

</head>
<body>
    <canvas id="canvas-bg" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></canvas>

    <nav class="navbar navbar-expand-lg shadow-sm fixed-top" style="background-color: #0a0a0a; border-bottom: 2px solid #C9A84C;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html" style="color: #C9A84C;">Abdoulaziz Ridwan Houssein</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link fw-bold border-bottom" href="index.html" style="color: #C9A84C; border-color: #C9A84C !important;">Home</a>
                <a class="nav-link" href="about.html" style="color: #E8E6E1;">About</a>
                <a class="nav-link" href="portfolio.html" style="color: #E8E6E1;">Projects</a>
                <a class="nav-link" href="contacts.html" style="color: #E8E6E1;">Contacts</a>
            </div>
        </div>
    </nav>

    <section class="hero-section">
        <div class="container">
            <div class="hero-content">

                <!-- LEFT SIDE - Content -->
                <div class="hero-left">
                    <!-- TYPING ANIMATION HERE -->
                    <div class="typing-container mb-3">
                        <span id="typing-text" class="typing-text"></span>
                    </div>

                    <p class="lead mb-4 text-secondary" data-aos="fade-right" data-aos-delay="100">2nd Year Computer Engineering Student | University of Djibouti</p>

                    <!-- SIDE BY SIDE API BOXES -->
                    <div class="api-container" data-aos="fade-right" data-aos-delay="200">
                        <!-- Live Network Diagnostics -->
                        <div class="api-box">
                            <h6>Live Network Diagnostics:</h6>
                            <p>IP Address: <span id="visitor-ip">Detecting...</span></p>
                            <p>Location: <span id="visitor-loc">Detecting...</span></p>
                        </div>

                        <!-- Quote API -->
                        <div class="api-box">
                            <h6>Daily Inspiration:</h6>
                            <div id="quote-container">
                                <p class="quote-loading">Loading...</p>
                            </div>
                        </div>
                    </div>

                    <div data-aos="fade-right" data-aos-delay="300" class="d-flex gap-3">
                        <a href="portfolio.html" class="btn btn-lg text-white px-4 py-2 shadow-sm" style="background-color: #C9A84C; border-radius: 8px; color: #0a0a0a !important; font-weight: 600;">View My Work</a>
                        <a href="contacts.html" class="btn btn-lg px-4 py-2 shadow-sm" style="border: 2px solid #C9A84C; color: #C9A84C; background-color: transparent; border-radius: 8px; font-weight: 500;">See Contacts</a>
                    </div>
                </div>

                <!-- RIGHT SIDE - Profile Picture -->
                <div class="hero-right" data-aos="fade-left">
                    <div class="profile-container">
                        <img src="cropped_circle_image.png" alt="Abdoulaziz Ridwan Houssein" class="profile-img">
                        <div class="profile-overlay"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <button onclick="toggleChat()" style="position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: #C9A84C; border: none; color: #0a0a0a; font-size: 24px; z-index: 1000; cursor: pointer; box-shadow: 0 4px 10px rgba(201, 168, 76, 0.4);">💬</button>

    <div id="chatbox" style="position: fixed; bottom: 90px; right: 20px; width: 300px; height: 400px; background: #1a1a1a; border: 1px solid #C9A84C; border-radius: 15px; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 5px 20px rgba(201, 168, 76, 0.3); z-index: 1000;">
        <div style="background: #C9A84C; color: #0a0a0a; padding: 15px; font-weight: bold; display: flex; justify-content: space-between;">
            <span>Assistant</span>
            <button onclick="toggleChat()" style="background: none; border: none; color: #0a0a0a; cursor: pointer;">✕</button>
        </div>
        <div id="chat-messages" style="flex: 1; padding: 15px; overflow-y: auto; color: #E8E6E1;"></div>
        <div style="padding: 10px; border-top: 1px solid #C9A84C; display: flex;">
            <input type="text" id="user-input" onkeypress="handleKey(event)" style="flex: 1; border: 1px solid #C9A84C; border-radius: 20px; padding: 8px 15px; outline: none; background-color: #2a2a2a; color: #E8E6E1;" placeholder="Ask me something...">
            <button onclick="sendMessage()" style="background: none; border: none; color: #C9A84C; margin-left: 5px; cursor: pointer;">➤</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="chatbot.js"></script>
    <script src="system-api.js"></script>
    <script src="particles.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        // TYPING ANIMATION SCRIPT
        const textToType = "Welcome to my Portfolio";
        const typingElement = document.getElementById('typing-text');
        let charIndex = 0;

        function typeText() {
            if (charIndex < textToType.length) {
                typingElement.textContent += textToType.charAt(charIndex);
                charIndex++;
                setTimeout(typeText, 100); // 100ms per character
            }
        }

        // Start typing animation when page loads
        window.addEventListener('load', () => {
            setTimeout(typeText, 500); // Small delay before starting
        });

        // QUOTE API SCRIPT - Using ZenQuotes API (Free, No Key Required)
        async function fetchQuote() {
            const quoteContainer = document.getElementById('quote-container');

            try {
                // Fetch random quote from ZenQuotes API
                const response = await fetch('https://zenquotes.io/api/random');

                if (!response.ok) {
                    throw new Error('Failed to fetch quote');
                }

                const data = await response.json();

                // ZenQuotes returns an array with one quote object
                if (data && data.length > 0) {
                    const quote = data[0];
                    const quoteText = quote.q; // The quote text
                    const quoteAuthor = quote.a; // The author

                    // Display the quote
                    quoteContainer.innerHTML = `
                        <p class="quote-text">"${quoteText}"</p>
                        <p class="quote-author">— ${quoteAuthor}</p>
                    `;
                } else {
                    throw new Error('No quote data received');
                }

            } catch (error) {
                console.error('Quote API Error:', error);
                // Fallback quote if API fails
                quoteContainer.innerHTML = `
                    <p class="quote-text">"The only way to do great work is to love what you do."</p>
                    <p class="quote-author">— Steve Jobs</p>
                `;
            }
        }

        // Fetch quote when page loads
        window.addEventListener('load', () => {
            fetchQuote();
        });
    </script>
</body>
</html>
